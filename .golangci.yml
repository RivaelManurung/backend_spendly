run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.24'

linters-settings:
  govet:
    check-shadowing: true
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    includes:
      - G101 # Look for hardcoded credentials
      - G104 # Audit errors sent to http.Error
      - G110 # Potential DoS vulnerability
      - G204 # Audit use of command execution
      - G304 # File path traversal
  staticcheck:
    checks: ["all"]
  unused:
    check-exported: true
  revive:
    rules:
      - name: exported
        disabled: false
      - name: var-naming
        disabled: false
      - name: package-comments
        disabled: false
  prealloc:
    simple: true
    range-loops: true
    for-loops: true
  bodyclose:
    # Checks whether HTTP response body is closed
    check-sensitive-methods: true

linters:
  disable-all: true
  enable:
    - errcheck      # Cek error handling yang lupa ditulis
    - gosimple      # Saran simplifikasi kode
    - govet         # Cek konstruksi mencurigakan (shadowing, printf, dll)
    - ineffassign   # Cari variabel yang dikasih nilai tapi gapernah dibaca
    - staticcheck   # Linter go vet "on steroids"
    - unused        # Cari konstanta/variabel/fungsi yang gapernah dipake
    - revive        # Code style & naming convention
    - gosec         # Security audit (SQL injection, hardcoded secrets)
    - prealloc      # Saran pre-alokasi slice (performa)
    - bodyclose     # Wajib tutup HTTP response body (cegah memory leak)
    - noctx         # Pastikan HTTP request pake Context
    - unparam       # Deteksi parameter fungsi yang gapernah dipake
    - misspell      # Cari typo di comment atau log
    - whitespace    # Cek whitespace yang berlebihan

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
